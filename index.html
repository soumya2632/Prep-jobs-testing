<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepJobs | Career & Prep Hub</title>
    <meta name="description" content="Ultimate platform for job searching and technical interview preparation.">
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="nav-content">
                <div class="logo" id="nav-home">
                    <i class="ph-fill ph-rocket-launch"></i>
                    <span>PrepJobs</span>
                </div>
                <ul class="nav-links">
                    <li><a href="#" class="active" data-view="home">Home</a></li>
                    <li><a href="#" data-view="jobs">Job Portal</a></li>
                    <li><a href="#" data-view="prep">Prep Hub</a></li>
                    <li><a href="#" data-view="dsa">DSA Sheet</a></li>
                    <li><a href="#" data-view="companies">Companies</a></li>
                </ul>
                <div class="nav-actions">
                    <button class="theme-toggle" id="theme-toggle" title="Toggle Dark/Light Mode">
                        <i class="ph ph-moon"></i>
                    </button>
                    <button class="btn btn-secondary">Login</button>
                    <button class="btn btn-primary">Sign Up</button>
                </div>
                <button class="mobile-menu-btn">
                    <i class="ph ph-list"></i>
                </button>
            </div>
        </nav>

        <!-- Dynamic Content Area -->
        <main id="main-content">
            <!-- Content will be injected by main.js -->
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-content">
                <div class="footer-brand">
                    <div class="logo">
                        <i class="ph-fill ph-rocket-launch"></i>
                        <span>PrepJobs</span>
                    </div>
                    <p>Elevate your career with industry-leading prep material and curated job opportunities.</p>
                </div>
                <div class="footer-links">
                    <div class="link-group">
                        <h4>Platform</h4>
                        <a href="#">Jobs</a>
                        <a href="#">DSA Sheet</a>
                        <a href="#">Resources</a>
                    </div>
                    <div class="link-group">
                        <h4>Company</h4>
                        <a href="#">About Us</a>
                        <a href="#">Contact</a>
                        <a href="#">Privacy</a>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 PrepJobs. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
